apiVersion: v1
kind: Service
metadata:
  name: weatherapp
  namespace: default
  labels:
    app: weatherapp
spec:
  selector:
    app: weatherapp
  type: NodePort        # ← pour accéder depuis l'extérieur via IP du master
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080   # ← port d'accès externe (entre 30000-32767)
