apiVersion: apps/v1
kind: Deployment
metadata:
  name: weatherapp
  namespace: default
  labels:
    app: weatherapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weatherapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: weatherapp
    spec:
      containers:
        - name: weatherapp
          image: imen8/weatherapp:latest  # ← Remplacer par ton image
          imagePullPolicy: Always
          ports:
            - containerPort: 80  # ← Adapter selon ton port applicatif
          env:
            - name: NODE_ENV
              value: "production"
            # Ajouter ici tes variables d'environnement
            # - name: API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: weatherapp-secret
            #       key: api-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      # imagePullSecrets:
      #   - name: registry-secret  # ← Décommenter si registry privé
